<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테슬라 충전 시간 계산기</title>
    <style>
        :root {
            --tesla-red: #cc0000;
            --bg-color: #111111;
            --card-bg: #1c1c1e;
            --text-color: #f5f5f7;
            --text-secondary: #86868b;
            --border-color: #333335;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* 모든 문장이 단어 단위(공백 기준)로 행 전환되도록 설정 */
            word-break: keep-all; 
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border-color);
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .clickable-group {
            cursor: pointer;
        }

        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: var(--text-color);
            font-weight: 500;
            pointer-events: none;
        }

        select, input[type="time"], input[type="tel"] {
            width: 100%;
            padding: 12px;
            background-color: #2c2c2e;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="time"], input[type="tel"] {
            cursor: pointer;
        }

        /* 시간 입력창 숫자는 가운데 정렬이 보기 좋습니다 */
        input[type="tel"] {
            text-align: center;
            letter-spacing: 1px;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--tesla-red);
        }

        #result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            background-color: #2c2c2e;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .result-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .result-time {
            font-size: 2rem;
            color: var(--text-secondary);
            font-weight: 700;
            margin-bottom: 12px;
            transition: color 0.3s ease;
        }

        .result-notice {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>테슬라 충전 시간 계산기</h1>
    <div class="subtitle">값 입력 시 실시간으로 계산됩니다</div>

    <!-- 1. 현재 충전 전력 선택 -->
    <div class="form-group">
        <label for="currentAmperage">현재 설정된 충전 전류</label>
        <select id="currentAmperage" onchange="calculateSwitchTime()">
            <option value="5">5 A (저속 부하)</option>
            <option value="32" selected>32 A (완속 최대)</option>
        </select>
    </div>

    <!-- 2. 현재 충전 완료 예상 시간 (하나의 폼으로 통합 및 모바일 숫자패드 강제) -->
    <div class="form-group">
        <label for="remTime">현재 기준 충전 완료까지 남은 시간</label>
        <input type="tel" id="remTime" inputmode="numeric" placeholder="00:00" oninput="handleRemTimeInput(this)">
    </div>

    <!-- 3. 목표 충전 완료 시각 -->
    <div class="form-group clickable-group" onclick="openTimePicker()">
        <label for="targetTime">목표 충전 완료 시각</label>
        <input type="time" id="targetTime" value="18:00" onchange="calculateSwitchTime()" onclick="event.stopPropagation(); this.showPicker();">
    </div>

    <!-- 결과 표시 영역 -->
    <div id="result">
        <div class="result-title" id="resultTitle">5A ➔ 32A 추천 전환 시각</div>
        <div class="result-time" id="resultTime">--:--</div>
        <div class="result-notice" id="resultNotice">정보를 입력하시면 계산이 시작됩니다.</div>
    </div>
</div>

<script>
    function openTimePicker() {
        const timeInput = document.getElementById('targetTime');
        if (typeof timeInput.showPicker === 'function') {
            timeInput.showPicker();
        } else {
            timeInput.focus();
        }
    }

    // [신규 로직] 우측 정렬식 시간 입력 핸들러
    function handleRemTimeInput(input) {
        // 숫자가 아닌 모든 문자 제거
        let value = input.value.replace(/\D/g, '');
        
        // 최대 4자리까지만 제한
        if (value.length > 4) {
            value = value.slice(-4);
        }

        // 아무것도 입력 안 했을 때는 빈 칸으로 유지
        if (value.length === 0) {
            input.value = '';
        } else {
            // 오른쪽부터 채워지도록 왼쪽에 0을 채움 (예: "5" -> "0005")
            let padded = value.padStart(4, '0');
            let hours = padded.substring(0, 2);
            let minutes = padded.substring(2, 4);
            
            input.value = `${hours}:${minutes}`;
        }

        // 입력될 때마다 실시간 계산기 호출
        calculateSwitchTime();
    }

    function calculateSwitchTime() {
        const currentAmperage = parseInt(document.getElementById('currentAmperage').value);
        const remTimeVal = document.getElementById('remTime').value;
        const targetTimeVal = document.getElementById('targetTime').value;

        const resultTitle = document.getElementById('resultTitle');
        const resultTime = document.getElementById('resultTime');
        const resultNotice = document.getElementById('resultNotice');

        // 상태 초기화
        resultTitle.textContent = "5A ➔ 32A 추천 전환 시각";
        resultTime.style.color = "var(--text-secondary)";

        // 입력값이 없거나 00:00 일 때 예외 처리
        if (!remTimeVal || remTimeVal === "00:00" || !targetTimeVal) {
            resultTime.textContent = "--:--";
            resultNotice.innerHTML = "남은 시간을 입력해 주세요.";
            return;
        }

        // "HH:MM" 형태로 들어온 남은 시간 파싱
        const [remHours, remMinutes] = remTimeVal.split(':').map(Number);

        const now = new Date();
        const [targetH, targetM] = targetTimeVal.split(':').map(Number);
        let targetDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), targetH, targetM, 0);
        
        if (targetDate <= now) {
            targetDate.setDate(targetDate.getDate() + 1);
        }

        const durationHours = (targetDate - now) / (1000 * 60 * 60);
        const totalChargeNeeded = (remHours + (remMinutes / 60)) * currentAmperage;
        const X = (32 * durationHours - totalChargeNeeded) / 27;

        if (X < 0) {
            resultTitle.textContent = "계산 결과";
            resultTime.textContent = "즉시 전환 필요";
            resultTime.style.color = "#ff453a";
            resultNotice.innerHTML = "지금 바로 32A로 올리지 않으면 목표 시각까지 완충이 불가능합니다.";
            return;
        }

        if (X > durationHours) {
            resultTitle.textContent = "계산 결과";
            resultTime.textContent = "5A 유지 가능";
            resultTime.style.color = "#007aff";
            resultNotice.innerHTML = "목표 시각까지 여유가 많아 5A 상태를 유지해도 충분합니다.";
            return;
        }

        const switchDate = new Date(now.getTime() + (X * 60 * 60 * 1000));
        
        const formatTime = (date) => {
            return date.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false });
        };

        const waitHours = Math.floor(X);
        const waitMinutes = Math.round((X - waitHours) * 60);

        resultTime.textContent = formatTime(switchDate);
        resultTime.style.color = "#34c759";
        resultNotice.innerHTML = `
            현재 시각(${formatTime(now)}) 기준, 앞으로 <strong>${waitHours}시간 ${waitMinutes}분 동안 5A로 유지</strong>하다가 위 시간에 32A로 올리시면 됩니다.
        `;
    }

    calculateSwitchTime();
</script>

</body>
</html>
