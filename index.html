<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테슬라 충전 시간 계산기</title>
    <style>
        :root {
            --tesla-red: #cc0000;
            --bg-color: #111111;
            --card-bg: #1c1c1e;
            --text-color: #f5f5f7;
            --text-secondary: #86868b;
            --border-color: #333335;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border-color);
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .clickable-group {
            cursor: pointer;
        }

        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: var(--text-color);
            font-weight: 500;
            pointer-events: none;
        }

        select, input[type="time"], input[type="number"] {
            width: 100%;
            padding: 12px;
            background-color: #2c2c2e;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="time"] {
            cursor: pointer;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--tesla-red);
        }

        .time-input-container {
            display: flex;
            gap: 10px;
        }

        .time-input-container div {
            flex: 1;
            display: flex;
            align-items: center;
            background-color: #2c2c2e;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding-right: 10px;
        }

        .time-input-container input {
            border: none;
            background: transparent;
            text-align: right;
            padding-right: 5px;
        }

        .time-input-container span {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        #result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            background-color: #2c2c2e;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .result-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .result-time {
            font-size: 2rem;
            color: var(--text-secondary);
            font-weight: 700;
            margin-bottom: 12px;
            transition: color 0.3s ease;
        }

        .result-notice {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 15px;
        }

        /* 버튼 컨테이너 및 공통 디자인 */
        .btn-container {
            display: none; /* 기본 숨김 */
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .action-btn {
            width: 100%;
            border: none;
            padding: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        /* 안드로이드 타이머 버튼 (오렌지 계열) */
        .btn-android {
            background-color: #ff9500;
            color: white;
            box-shadow: 0 4px 12px rgba(255, 149, 0, 0.3);
        }
        .btn-android:hover { background-color: #e08400; }

        /* 아이폰/공용 캘린더 버튼 (그린 계열) */
        .btn-ios {
            background-color: #34c759;
            color: white;
            box-shadow: 0 4px 12px rgba(52, 199, 89, 0.3);
        }
        .btn-ios:hover { background-color: #2eb14e; }
    </style>
</head>
<body>

<div class="container">
    <h1>테슬라 충전 시간 계산기</h1>
    <div class="subtitle">값 입력 시 실시간으로 계산됩니다</div>

    <!-- 1. 현재 충전 전력 선택 -->
    <div class="form-group">
        <label for="currentAmperage">현재 설정된 충전 전류</label>
        <select id="currentAmperage" onchange="calculateSwitchTime()">
            <option value="5">5 A (저속 부하)</option>
            <option value="32">32 A (완속 최대)</option>
        </select>
    </div>

    <!-- 2. 현재 충전 완료 예상 시간 -->
    <div class="form-group">
        <label>현재 기준 충전 완료까지 남은 시간</label>
        <div class="time-input-container">
            <div>
                <input type="number" id="remHours" min="0" placeholder="0" oninput="calculateSwitchTime()">
                <span>시간</span>
            </div>
            <div>
                <input type="number" id="remMinutes" min="0" max="59" placeholder="0" oninput="calculateSwitchTime()">
                <span>분</span>
            </div>
        </div>
    </div>

    <!-- 3. 목표 충전 완료 시각 -->
    <div class="form-group clickable-group" onclick="openTimePicker()">
        <label for="targetTime">목표 충전 완료 시각</label>
        <input type="time" id="targetTime" value="18:00" onchange="calculateSwitchTime()" onclick="event.stopPropagation(); this.showPicker();">
    </div>

    <!-- 결과 표시 영역 -->
    <div id="result">
        <div class="result-title" id="resultTitle">5A ➔ 32A 추천 전환 시각</div>
        <div class="result-time" id="resultTime">--:--</div>
        <div class="result-notice" id="resultNotice">정보를 입력하시면 계산이 시작됩니다.</div>
        
        <!-- 원터치 알림 등록 버튼 그룹 -->
        <div class="btn-container" id="btnContainer">
            <button class="action-btn btn-android" onclick="startAndroidTimer()">⏳ 갤럭시/안드로이드 타이머 시작</button>
            <button class="action-btn btn-ios" onclick="addAlarmToCalendar()">📅 아이폰/공용 캘린더 알림 등록</button>
        </div>
    </div>
</div>

<script>
    let calculatedSwitchDate = null;
    let remainingSecondsForTimer = 0; // 타이머 설정을 위한 초 단위 저장 변수

    function openTimePicker() {
        const timeInput = document.getElementById('targetTime');
        if (typeof timeInput.showPicker === 'function') {
            timeInput.showPicker();
        } else {
            timeInput.focus();
        }
    }

    function calculateSwitchTime() {
        const currentAmperage = parseInt(document.getElementById('currentAmperage').value);
        const remHours = parseInt(document.getElementById('remHours').value) || 0;
        const remMinutes = parseInt(document.getElementById('remMinutes').value) || 0;
        const targetTimeVal = document.getElementById('targetTime').value;

        const resultTitle = document.getElementById('resultTitle');
        const resultTime = document.getElementById('resultTime');
        const resultNotice = document.getElementById('resultNotice');
        const btnContainer = document.getElementById('btnContainer');

        // 상태 초기화
        resultTitle.textContent = "5A ➔ 32A 추천 전환 시각";
        resultTime.style.color = "var(--text-secondary)";
        btnContainer.style.display = "none";
        calculatedSwitchDate = null;
        remainingSecondsForTimer = 0;

        if (!targetTimeVal || (remHours === 0 && remMinutes === 0)) {
            resultTime.textContent = "--:--";
            resultNotice.innerHTML = "남은 시간을 입력해 주세요. (목표 시각은 18:00으로 기본 설정되어 있습니다)";
            return;
        }

        const now = new Date();
        const [targetH, targetM] = targetTimeVal.split(':').map(Number);
        let targetDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), targetH, targetM, 0);
        
        if (targetDate <= now) {
            targetDate.setDate(targetDate.getDate() + 1);
        }

        const durationHours = (targetDate - now) / (1000 * 60 * 60);
        const totalChargeNeeded = (remHours + (remMinutes / 60)) * currentAmperage;
        const X = (32 * durationHours - totalChargeNeeded) / 27;

        if (X < 0) {
            resultTitle.textContent = "계산 결과";
            resultTime.textContent = "즉시 전환 필요";
            resultTime.style.color = "#ff453a";
            resultNotice.innerHTML = "지금 바로 32A로 올리지 않으면 목표 시각까지 완충이 불가능합니다.";
            return;
        }

        if (X > durationHours) {
            resultTitle.textContent = "계산 결과";
            resultTime.textContent = "5A 유지 가능";
            resultTime.style.color = "#007aff";
            resultNotice.innerHTML = "목표 시각까지 여유가 많아 밤새 5A 상태를 유지해도 충분합니다.";
            return;
        }

        // 정상 계산 완료
        const switchDate = new Date(now.getTime() + (X * 60 * 60 * 1000));
        calculatedSwitchDate = switchDate;
        
        // 타이머용 '남은 초' 계산 (정수형태)
        remainingSecondsForTimer = Math.max(1, Math.round((switchDate - now) / 1000));

        const formatTime = (date) => {
            return date.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false });
        };

        const waitHours = Math.floor(X);
        const waitMinutes = Math.round((X - waitHours) * 60);

        resultTime.textContent = formatTime(switchDate);
        resultTime.style.color = "#34c759";
        resultNotice.innerHTML = `
            현재 시각(${formatTime(now)}) 기준, 앞으로 <strong>${waitHours}시간 ${waitMinutes}분 동안 5A로 유지</strong>하다가 위 시간에 32A로 올리시면 됩니다.
        `;
        
        // 정상 계산 완료 시 버튼 컨테이너 노출 (안드로이드 타이머 + 아이폰 캘린더)
        btnContainer.style.display = "flex";
    }

    // [안드로이드 전용] 순정 시계 앱의 타이머 기능 호출
    function startAndroidTimer() {
        if (remainingSecondsForTimer <= 0) return;

        const label = encodeURIComponent("⚡ 테슬라 충전 전류 변경 (32A)");
        // 안드로이드 시스템 Intent 주소 생성 (초 단위 입력, 라벨 포함, UI 스킵 안 함)
        const intentUrl = `intent:#Intent;action=android.intent.action.SET_TIMER;i.android.intent.extra.alarm.LENGTH=${remainingSecondsForTimer};s.android.intent.extra.alarm.MESSAGE=${label};end`;
        
        window.location.href = intentUrl;
    }

    // [아이폰/공용] 캘린더 등록 함수
    function addAlarmToCalendar() {
        if (!calculatedSwitchDate) return;

        const formatICSDate = (date) => {
            const pad = (num) => String(num).padStart(2, '0');
            return `${date.getFullYear()}${pad(date.getMonth() + 1)}${pad(date.getDate())}T${pad(date.getHours())}${pad(date.getMinutes())}00`;
        };

        const start = formatICSDate(calculatedSwitchDate);
        const endDate = new Date(calculatedSwitchDate.getTime() + 10 * 60 * 1000);
        const end = formatICSDate(endDate);

        const icsContent = [
            'BEGIN:VCALENDAR',
            'VERSION:2.0',
            'PRODID:-//Tesla Charging Switcher//KR',
            'BEGIN:VEVENT',
            `DTSTART:${start}`,
            `DTEND:${end}`,
            'SUMMARY:⚡ 테슬라 충전 전류 변경 (5A ➔ 32A)',
            'DESCRIPTION:테슬라 충전 전류를 32A로 변경하여 속도를 높일 시간입니다.',
            'BEGIN:VALARM',
            'TRIGGER:PT0M',
            'ACTION:DISPLAY',
            'DESCRIPTION:Tesla Reminder',
            'END:VALARM',
            'END:VEVENT',
            'END:VCALENDAR'
        ].join('\r\n');

        const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'tesla_switch_reminder.ics';
        link.click();
        URL.revokeObjectURL(link.href);
    }

    calculateSwitchTime();
</script>

</body>
</html>
